<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气智能服务系统 - 生活决策助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>☀️ 天气智能服务系统</h1>
            <p class="subtitle">您的生活决策助手</p>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 输入区域 -->
            <section class="input-section">
                <h2>提出您的问题</h2>
                <div class="input-group">
                    <input 
                        type="text" 
                        id="userInput" 
                        class="input-box" 
                        placeholder="例如: 明天太原适合出行吗? 或 今天北京的天气?"
                        autocomplete="off"
                    >
                    <button id="submitBtn" class="submit-btn">🔍 查询</button>
                </div>
                <div class="example-prompts">
                    <p>常见问题示例:</p>
                    <button class="example-btn" onclick="askExample('今天太原天气怎么样?')">今天天气</button>
                    <button class="example-btn" onclick="askExample('明天适合运动吗?')">运动建议</button>
                    <button class="example-btn" onclick="askExample('北京这周会下雨吗?')">降雨预报</button>
                    <button class="example-btn" onclick="askExample('今天应该穿什么?')">穿衣建议</button>
                </div>
            </section>

            <!-- 结果展示区 -->
            <section id="resultSection" class="result-section" style="display: none;">
                <!-- 加载动画 -->
                <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                    <div class="spinner"></div>
                    <p>正在分析天气数据...</p>
                </div>

                <!-- 结果内容 -->
                <div id="resultContent" style="display: none;">
                    <div class="result-header">
                        <h3>💡 分析结果</h3>
                    </div>

                    <!-- 天气摘要 -->
                    <div class="weather-summary">
                        <h4>🌡️ 天气信息</h4>
                        <div id="weatherSummary" class="summary-content"></div>
                    </div>

                    <!-- 意图识别 -->
                    <div class="intent-info">
                        <h4>🎯 您的需求</h4>
                        <p>意图: <span id="intentType" class="badge badge-info">--</span></p>
                        <p>地点: <span id="location" class="badge badge-primary">--</span></p>
                    </div>

                    <!-- 智能建议 -->
                    <div class="smart-response">
                        <h4>📋 智能建议</h4>
                        <div id="responseContent" class="response-box"></div>
                    </div>

                    <!-- 实体信息 -->
                    <div class="entities-info" id="entitiesSection" style="display: none;">
                        <h4>📊 识别信息</h4>
                        <div id="entitiesContent" class="entities-box"></div>
                    </div>
                </div>

                <!-- 错误显示 -->
                <div id="errorContent" class="error-box" style="display: none;">
                    <h4>❌ 错误</h4>
                    <p id="errorMessage"></p>
                </div>
            </section>

            <!-- 快速查询区域 -->
            <section class="quick-query-section">
                <h3>快速天气查询</h3>
                <div class="city-buttons">
                    <button class="city-btn" onclick="quickQuery('太原')">太原</button>
                    <button class="city-btn" onclick="quickQuery('北京')">北京</button>
                    <button class="city-btn" onclick="quickQuery('上海')">上海</button>
                    <button class="city-btn" onclick="quickQuery('广州')">广州</button>
                    <button class="city-btn" onclick="quickQuery('深圳')">深圳</button>
                </div>
            </section>
        </main>

        <!-- 底部 -->
        <footer class="footer">
            <p>© 2026 天气智能服务系统 | 基于自然语言处理和生活场景决策 | <a href="#">关于我们</a></p>
        </footer>
    </div>

    <!-- 脚本 -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
